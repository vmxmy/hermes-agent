version: "3.9"

# ─────────────────────────────────────────────────────────────────────────────
# Hermes Agent — Multi-Tenant Docker Compose
#
# Each service = one tenant = one bot token = one isolated HERMES_HOME.
#
# Directory layout per tenant:
#   tenants/<name>/
#   ├── .env          ← bot tokens and platform credentials
#   └── data/         ← HERMES_HOME bind-mount (sessions, memories, config…)
#                        created automatically on first start
#
# Credential loading order (later wins):
#   1. .env.shared         — shared LLM API keys and terminal defaults
#   2. tenants/<name>/.env — tenant-specific bot tokens and overrides
#
# Add a new tenant:
#   ./add-tenant.sh <name>        # scaffold .env + data/ + print compose block
#   $EDITOR tenants/<name>/.env   # fill in bot tokens
#   # paste printed block into docker-compose.yml
#   docker compose up -d <name>
# ─────────────────────────────────────────────────────────────────────────────

x-hermes: &hermes-defaults
  build:
    context: ..
    dockerfile: Dockerfile
  restart: unless-stopped
  command: gateway start
  # Optional: pin image instead of building locally
  # image: ghcr.io/nousresearch/hermes-agent:latest

services:
  # ── Tenant: alice ───────────────────────────────────────────────────────────
  alice:
    <<: *hermes-defaults
    container_name: hermes-alice
    volumes:
      - ./tenants/alice/data:/opt/data   # HERMES_HOME → tenants/alice/data/
    env_file:
      - .env.shared
      - tenants/alice/.env

  # ── Tenant: bob ─────────────────────────────────────────────────────────────
  bob:
    <<: *hermes-defaults
    container_name: hermes-bob
    volumes:
      - ./tenants/bob/data:/opt/data     # HERMES_HOME → tenants/bob/data/
    env_file:
      - .env.shared
      - tenants/bob/.env

  # ── Add more tenants here ───────────────────────────────────────────────────
